<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNAKE</title>
  <style>
    :root { --accent: #00ffff; --bg: #0a0a0f; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }

    #canvas {
      position: fixed;
      top: 0; left: 0;
      display: block;
      image-rendering: pixelated;
    }

    /* ── HUD ─────────────────────────────────────────────────────── */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 22px;
      padding: 6px 20px;
      background: rgba(10,10,15,0.82);
      border-bottom: 1px solid rgba(0,255,255,0.12);
      font-family: 'Courier New', monospace;
      font-size: 0.82rem;
      letter-spacing: 0.15em;
    }
    #hud label { color: #555; }
    #hud span  { color: var(--accent); text-shadow: 0 0 6px var(--accent); }

    #boostHud { display: none; align-items: center; gap: 6px; }
    #boostBar { width: 70px; height: 5px; background: #1a1a2e; border-radius: 3px; overflow: hidden; }
    #boostBarFill { height: 100%; background: #ffee00; box-shadow: 0 0 5px #ffee00; border-radius: 3px; }

    #muteBtn {
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      background: none;
      border: 1px solid #333;
      border-radius: 3px;
      padding: 2px 8px;
      color: #888;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    #muteBtn:hover { color: var(--accent); border-color: var(--accent); }

    /* ── Overlay ─────────────────────────────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      pointer-events: none;
      background: rgba(10,10,15,0.65);
      font-family: 'Courier New', monospace;
    }
    #overlayTitle {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      letter-spacing: 0.5em;
      color: var(--accent);
      text-shadow: 0 0 12px var(--accent), 0 0 40px var(--accent);
    }
    #msg {
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      letter-spacing: 0.3em;
      color: #f0f;
      text-shadow: 0 0 12px #f0f, 0 0 40px #f0f;
    }
    #sub { font-size: 0.78rem; color: #666; letter-spacing: 0.18em; }

    /* ── Controls ────────────────────────────────────────────────── */
    #controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 22px;
      padding: 6px 20px;
      background: rgba(10,10,15,0.82);
      border-top: 1px solid rgba(0,255,255,0.08);
      flex-wrap: wrap;
      font-family: 'Courier New', monospace;
    }
    .ctrl {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      font-size: 0.58rem;
      color: #777;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .ctrl input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 100px; height: 3px;
      background: #1a1a2e; border-radius: 2px; outline: none;
    }
    .ctrl input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 11px; height: 11px;
      background: var(--accent); border-radius: 50%;
      box-shadow: 0 0 4px var(--accent); cursor: pointer;
    }
    .ctrl input[type=color] {
      -webkit-appearance: none; appearance: none;
      width: 36px; height: 20px;
      border: 1px solid #333; background: none; cursor: pointer; padding: 0; border-radius: 2px;
    }
    .ctrl input[type=color]::-webkit-color-swatch-wrapper { padding: 2px; }
    .ctrl input[type=color]::-webkit-color-swatch { border: none; border-radius: 1px; }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="hud">
  <div><label>SCORE </label><span id="scoreEl">0</span></div>
  <div><label>HIGH </label><span id="highEl">0</span></div>
  <div><label>LEVEL </label><span id="levelEl">1</span></div>
  <div><label>LEN </label><span id="lenEl">0</span></div>
  <div id="boostHud">
    <label>BOOST </label>
    <div id="boostBar"><div id="boostBarFill" style="width:100%"></div></div>
  </div>
  <button id="muteBtn">♪ AN</button>
</div>

<div id="overlay">
  <div id="overlayTitle">SNAKE</div>
  <div id="msg">PRESS SPACE</div>
  <div id="sub">WASD / PFEILTASTEN &nbsp;·&nbsp; M = MUSIK AN/AUS</div>
</div>

<div id="controls">
  <div class="ctrl">
    <label>Geschwindigkeit</label>
    <input type="range" id="speedCtrl" min="1" max="20" value="8">
    <span id="speedVal">8</span>
  </div>
  <div class="ctrl"><label>Schlange</label><input type="color" id="snakeColor" value="#00ffff"></div>
  <div class="ctrl"><label>Frucht</label><input type="color" id="fruitColor" value="#ff00ff"></div>
  <div class="ctrl"><label>Schriftfarbe</label><input type="color" id="fontColor" value="#00ffff"></div>
  <div class="ctrl"><label>Hintergrund</label><input type="color" id="bgColor" value="#0a0a0f"></div>
</div>

<script>
// ── canvas: full screen ───────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

const CELL = 20;
const COLS = Math.floor(window.innerWidth  / CELL);
const ROWS = Math.floor(window.innerHeight / CELL);
canvas.width  = COLS * CELL;
canvas.height = ROWS * CELL;
// center the tiny remainder gap
canvas.style.left = ((window.innerWidth  - canvas.width)  / 2) + 'px';
canvas.style.top  = ((window.innerHeight - canvas.height) / 2) + 'px';

// ── audio ─────────────────────────────────────────────────────────────────
let audioCtx  = null;
let masterGain = null;
let muted = false;

function getAC() {
  if (!audioCtx) {
    audioCtx   = new AudioContext();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.7;
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// single note (flat pitch)
function tone(freq, type, vol, dur, startAt) {
  const a  = getAC();
  const t  = startAt ?? a.currentTime;
  const o  = a.createOscillator();
  const g  = a.createGain();
  o.connect(g); g.connect(masterGain);
  o.type = type;
  o.frequency.value = freq;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.start(t); o.stop(t + dur + 0.01);
}

// pitch-sweep note
function sweep(f0, f1, type, vol, dur, startAt) {
  const a  = getAC();
  const t  = startAt ?? a.currentTime;
  const o  = a.createOscillator();
  const g  = a.createGain();
  o.connect(g); g.connect(masterGain);
  o.type = type;
  o.frequency.setValueAtTime(f0, t);
  o.frequency.exponentialRampToValueAtTime(f1, t + dur * 0.9);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.start(t); o.stop(t + dur + 0.01);
}

function playEatSound() {
  const a = getAC(), t = a.currentTime;
  sweep(700, 150, 'square', 0.35, 0.07, t);
  sweep(500, 100, 'square', 0.22, 0.07, t + 0.055);
}
function playDeathSound() {
  const a = getAC(), t = a.currentTime;
  [330, 262, 220, 147].forEach((f, i) => tone(f, 'sawtooth', 0.28, 0.2, t + i * 0.2));
}
function playLevelUpSound() {
  const a = getAC(), t = a.currentTime;
  [262, 330, 392, 523].forEach((f, i) => tone(f, 'square', 0.2, 0.12, t + i * 0.1));
}
function playBoostSound() {
  const a = getAC(), t = a.currentTime;
  [440, 550, 660, 880].forEach((f, i) => tone(f, 'triangle', 0.25, 0.1, t + i * 0.07));
}
function playBreakSound() {
  sweep(400, 60, 'sawtooth', 0.3, 0.12);
}

// ── background music ──────────────────────────────────────────────────────
// C minor pentatonic chiptune, 16-step loop @ 130 BPM
const BPM_STEP = 60 / 130 / 2; // 8th note ~0.23s

const C3=130.81, Eb3=155.56, F3=174.61, G3=196.00, Bb3=233.08;
const C4=261.63, Eb4=311.13, F4=349.23, G4=392.00, Bb4=466.16, C5=523.25;

const BASS_PAT = [C3,0,G3,0, Bb3,0,F3,0, C3,0,Eb3,0, F3,0,G3,0];
const LEAD_PAT = [0,C4,0,Eb4, G4,0,Bb4,0, 0,G4,0,F4, Eb4,0,F4,C5];

let musicId   = null;
let musicStep = 0;
let nextBeat  = 0;

function scheduleMusicNotes() {
  if (!audioCtx) return;
  const a = getAC();
  while (nextBeat < a.currentTime + 0.3) {
    const s = musicStep % 16;
    if (BASS_PAT[s]) tone(BASS_PAT[s], 'triangle', 0.08, BPM_STEP * 1.7, nextBeat);
    if (LEAD_PAT[s]) tone(LEAD_PAT[s], 'square',   0.04, BPM_STEP * 0.7, nextBeat);
    nextBeat += BPM_STEP;
    musicStep++;
  }
}

function startMusic() {
  if (musicId) return;
  const a = getAC();
  nextBeat = a.currentTime + 0.05;
  musicId  = setInterval(scheduleMusicNotes, 40);
}

function stopMusic() {
  clearInterval(musicId);
  musicId = null;
}

function toggleMute() {
  muted = !muted;
  if (masterGain) masterGain.gain.value = muted ? 0 : 0.7;
  document.getElementById('muteBtn').textContent = muted ? '♪ AUS' : '♪ AN';
}

// ── color settings ────────────────────────────────────────────────────────
let snakeHex  = '#00ffff';
let fruitHex  = '#ff00ff';
let accentHex = '#00ffff';
let bgHex     = '#0a0a0f';
let baseSpeed = 8;

function setAccent(h) { accentHex = h; document.documentElement.style.setProperty('--accent', h); }
function setBg(h)     { bgHex = h;     document.documentElement.style.setProperty('--bg', h); }

document.getElementById('snakeColor').addEventListener('input', e => snakeHex = e.target.value);
document.getElementById('fruitColor').addEventListener('input', e => fruitHex = e.target.value);
document.getElementById('fontColor').addEventListener('input',  e => setAccent(e.target.value));
document.getElementById('bgColor').addEventListener('input',    e => setBg(e.target.value));
document.getElementById('muteBtn').addEventListener('click',    toggleMute);
document.getElementById('speedCtrl').addEventListener('input', e => {
  baseSpeed = +e.target.value;
  document.getElementById('speedVal').textContent = baseSpeed;
  if (running) restartLoop();
});

function effectiveSpeed() { return Math.min(20, baseSpeed + (level - 1)); }
function restartLoop()    { clearInterval(loopId); loopId = setInterval(tick, 1000 / effectiveSpeed()); }

// ── state ─────────────────────────────────────────────────────────────────
let snake, dir, nextDir, fruit, walls, movingWalls, boostItem;
let score, level, highScore = 0, running = false;
let boostActive = false, boostEndTime = 0;
let wallMoveCounter = 0, levelFlashTime = -Infinity;
let loopId;

function rnd(n)  { return Math.floor(Math.random() * n); }
function hexRgb(h) { return `${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`; }

// Build occupied set. When spawning fruit, pass includeFruit:false so we
// don't reference the (now-stale) old fruit position at all.
function buildOcc({ includeFruit = true, includeBoost = true } = {}) {
  const s = new Set();
  snake.forEach(c => s.add(`${c.x},${c.y}`));
  walls.forEach(c => s.add(`${c.x},${c.y}`));
  movingWalls.forEach(g => g.cells.forEach(c => s.add(`${c.x},${c.y}`)));
  if (includeFruit && fruit)     s.add(`${fruit.x},${fruit.y}`);
  if (includeBoost && boostItem) s.add(`${boostItem.x},${boostItem.y}`);
  return s;
}

function freeCell(occ) {
  for (let i = 0; i < 2000; i++) {
    const c = { x: rnd(COLS), y: rnd(ROWS) };
    if (!occ.has(`${c.x},${c.y}`)) return c;
  }
  for (let y = 0; y < ROWS; y++)   // systematic fallback
    for (let x = 0; x < COLS; x++)
      if (!occ.has(`${x},${y}`)) return { x, y };
  return null;
}

function spawnFruit() {
  // Explicitly exclude all snake cells; do NOT include old fruit in occ
  // (its position is now snake[0] anyway since we just ate it)
  const occ = buildOcc({ includeFruit: false, includeBoost: true });
  const c   = freeCell(occ);
  if (c) fruit = c;
}

function spawnBoostItem() {
  const occ = buildOcc({ includeFruit: true, includeBoost: false });
  const c   = freeCell(occ);
  if (c) boostItem = c;
}

function spawnSegment(len, margin = 1, moving = false) {
  const horiz = Math.random() < 0.5;
  const occ   = buildOcc();
  for (let a = 0; a < 80; a++) {
    const sx = margin + rnd(COLS - margin * 2 - (horiz ? len - 1 : 0));
    const sy = margin + rnd(ROWS - margin * 2 - (horiz ? 0 : len - 1));
    const cells = Array.from({ length: len }, (_, i) => ({
      x: sx + (horiz ? i : 0), y: sy + (horiz ? 0 : i)
    }));
    if (cells.every(c => !occ.has(`${c.x},${c.y}`))) {
      if (moving) return { cells, axis: horiz ? 'h' : 'v', dir: Math.random() < 0.5 ? 1 : -1 };
      return cells;
    }
  }
  return moving ? null : [];
}

function init() {
  const sx    = Math.floor(COLS / 2);
  const sy    = Math.floor(ROWS / 2);
  snake       = Array.from({ length: 15 }, (_, i) => ({ x: sx - i, y: sy }));
  dir         = { x: 1, y: 0 };
  nextDir     = { x: 1, y: 0 };
  walls       = [];
  movingWalls = [];
  boostItem   = null;
  fruit       = null;
  score       = 0;
  level       = 1;
  boostActive      = false;
  boostEndTime     = 0;
  wallMoveCounter  = 0;
  levelFlashTime   = -Infinity;
  spawnFruit();
  updateHud();
}

// ── game loop ─────────────────────────────────────────────────────────────
function tick() {
  if (boostActive && Date.now() > boostEndTime) boostActive = false;

  wallMoveCounter++;
  const moveEvery = Math.max(2, 6 - Math.floor(level / 2));
  if (wallMoveCounter >= moveEvery) {
    wallMoveCounter = 0;
    stepMovingWalls();
    if (!running) return;
  }

  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { die(); return; }
  if (snake.slice(0, -1).some(s => s.x === head.x && s.y === head.y)) { die(); return; }

  const wi = walls.findIndex(w => w.x === head.x && w.y === head.y);
  if (wi !== -1) {
    if (boostActive) { walls.splice(wi, 1); playBreakSound(); }
    else             { die(); return; }
  }

  for (const group of movingWalls) {
    const ci = group.cells.findIndex(c => c.x === head.x && c.y === head.y);
    if (ci !== -1) {
      if (boostActive) { group.cells.splice(ci, 1); playBreakSound(); }
      else             { die(); return; }
    }
  }
  movingWalls = movingWalls.filter(g => g.cells.length > 0);

  snake.unshift(head);

  if (boostItem && head.x === boostItem.x && head.y === boostItem.y) {
    boostItem    = null;
    boostActive  = true;
    boostEndTime = Date.now() + 5000;
    playBoostSound();
  }

  if (head.x === fruit.x && head.y === fruit.y) {
    score++;
    if (score > highScore) highScore = score;
    playEatSound();
    spawnFruit();

    const wallEvery = Math.max(1, 4 - Math.floor(level / 2));
    if (score % wallEvery === 0) {
      const seg = spawnSegment(2 + rnd(2));
      walls.push(...seg);
    }

    if (score % 8 === 0 && !boostItem) spawnBoostItem();

    checkLevelUp();
  } else {
    snake.pop();
  }

  updateHud();
  draw();
}

function stepMovingWalls() {
  const staticSet = new Set(walls.map(w => `${w.x},${w.y}`));
  for (const group of movingWalls) {
    const dx   = group.axis === 'h' ? group.dir : 0;
    const dy   = group.axis === 'v' ? group.dir : 0;
    const next = group.cells.map(c => ({ x: c.x + dx, y: c.y + dy }));
    const other = new Set(
      movingWalls.filter(g => g !== group).flatMap(g => g.cells).map(c => `${c.x},${c.y}`)
    );
    const blocked = next.some(c =>
      c.x < 0 || c.x >= COLS || c.y < 0 || c.y >= ROWS ||
      staticSet.has(`${c.x},${c.y}`) || other.has(`${c.x},${c.y}`)
    );
    if (blocked) { group.dir *= -1; continue; }

    const headKey = `${snake[0].x},${snake[0].y}`;
    if (next.some(c => `${c.x},${c.y}` === headKey)) {
      if (boostActive) {
        group.cells = next.filter(c => `${c.x},${c.y}` !== headKey);
        playBreakSound();
      } else {
        die(); return;
      }
    } else {
      group.cells = next;
    }
  }
  movingWalls = movingWalls.filter(g => g.cells.length > 0);
}

function checkLevelUp() {
  const newLevel = Math.floor(score / 5) + 1;
  if (newLevel <= level) return;
  level = newLevel;
  restartLoop();
  if (movingWalls.length < 6) {
    const group = spawnSegment(2 + rnd(2), 2, true);
    if (group) movingWalls.push(group);
  }
  levelFlashTime = Date.now();
  playLevelUpSound();
}

function die() {
  running = false;
  clearInterval(loopId);
  stopMusic();
  playDeathSound();
  if (score > highScore) highScore = score;
  updateHud();
  showOverlay('GAME OVER', `Score: ${score} &nbsp;·&nbsp; SPACE zum Neustart`);
}

function start() {
  init();
  running = true;
  restartLoop();
  startMusic();
  hideOverlay();
  draw();
}

// ── HUD ───────────────────────────────────────────────────────────────────
function updateHud() {
  document.getElementById('scoreEl').textContent = score ?? 0;
  document.getElementById('highEl').textContent  = highScore;
  document.getElementById('levelEl').textContent = level ?? 1;
  document.getElementById('lenEl').textContent   = snake ? snake.length : 0;
}

function updateBoostBar() {
  const hud = document.getElementById('boostHud');
  if (boostActive) {
    hud.style.display = 'flex';
    const pct = Math.max(0, (boostEndTime - Date.now()) / 5000) * 100;
    document.getElementById('boostBarFill').style.width = pct + '%';
  } else {
    hud.style.display = 'none';
  }
}

function showOverlay(msg, sub) {
  document.getElementById('overlayTitle').style.display = '';
  document.getElementById('msg').innerHTML = msg;
  document.getElementById('sub').innerHTML = sub;
  document.getElementById('overlay').style.display = 'flex';
}

function hideOverlay() {
  document.getElementById('overlay').style.display = 'none';
}

// ── draw ──────────────────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle = bgHex;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawGrid();
  drawWalls();
  drawMovingWalls();
  drawBoostItem();
  drawFruit();
  drawSnake();
  drawLevelFlash();
}

function drawGrid() {
  ctx.strokeStyle = '#ffffff06';
  ctx.lineWidth   = 1;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
  }
}

function block(x, y, color, glow, alpha = 1) {
  const px = x * CELL, py = y * CELL;
  const rgb = hexRgb(color);
  if (glow > 0) { ctx.shadowColor = `rgba(${rgb},${alpha})`; ctx.shadowBlur = glow; }
  ctx.fillStyle = `rgba(${rgb},${alpha * 0.2})`;
  ctx.fillRect(px + 1, py + 1, CELL - 2, CELL - 2);
  ctx.fillStyle = `rgba(${rgb},${alpha})`;
  ctx.fillRect(px + 3, py + 3, CELL - 6, CELL - 6);
  ctx.shadowBlur = 0;
}

function drawWalls() {
  walls.forEach(w => {
    block(w.x, w.y, '#ff6600', 8, 0.9);
    const px = w.x * CELL, py = w.y * CELL;
    ctx.strokeStyle = 'rgba(255,100,0,0.4)';
    ctx.lineWidth   = 1;
    ctx.beginPath(); ctx.moveTo(px+3, py+3); ctx.lineTo(px+CELL-3, py+CELL-3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px+CELL-3, py+3); ctx.lineTo(px+3, py+CELL-3); ctx.stroke();
  });
}

function drawMovingWalls() {
  movingWalls.forEach(group => {
    group.cells.forEach(c => {
      block(c.x, c.y, '#ff0055', 12, 0.95);
      const cx = c.x * CELL + CELL / 2, cy = c.y * CELL + CELL / 2;
      const dx = group.axis === 'h' ? group.dir : 0;
      const dy = group.axis === 'v' ? group.dir : 0;
      ctx.fillStyle = 'rgba(255,80,130,0.9)';
      ctx.beginPath();
      ctx.moveTo(cx + dx*5, cy + dy*5);
      ctx.lineTo(cx - dx*3 + dy*3, cy - dy*3 + dx*3);
      ctx.lineTo(cx - dx*3 - dy*3, cy - dy*3 - dx*3);
      ctx.closePath();
      ctx.fill();
    });
  });
}

function drawBoostItem() {
  if (!boostItem) return;
  const p = 0.65 + 0.35 * Math.sin(Date.now() / 350);
  const px = boostItem.x * CELL, py = boostItem.y * CELL;
  const cx = px + CELL / 2, cy = py + CELL / 2;
  ctx.shadowColor = `rgba(255,238,0,${p})`;
  ctx.shadowBlur  = 18 * p;
  ctx.fillStyle   = `rgba(255,238,0,${p})`;
  ctx.fillRect(cx+1,  cy-7, 4, 7);
  ctx.fillRect(cx-3,  cy-1, 8, 3);
  ctx.fillRect(cx-5,  cy+2, 4, 7);
  ctx.shadowBlur = 0;
}

function drawSnake() {
  snake.forEach((seg, i) => {
    const alpha  = 0.4 + 0.6 * (1 - i / snake.length);
    const isHead = i === 0;
    const color  = boostActive ? '#ffffff' : snakeHex;
    block(seg.x, seg.y, color, isHead ? (boostActive ? 22 : 12) : 0, alpha);
    if (isHead) {
      const rgb = hexRgb(color);
      ctx.fillStyle = `rgba(${rgb},1)`;
      const ex = dir.x, ey = dir.y;
      const cx = seg.x * CELL + CELL / 2, cy = seg.y * CELL + CELL / 2;
      const offs = ex !== 0 ? [{x:ex*4,y:-3},{x:ex*4,y:3}] : [{x:-3,y:ey*4},{x:3,y:ey*4}];
      offs.forEach(o => ctx.fillRect(cx + o.x - 1, cy + o.y - 1, 3, 3));
    }
  });
}

function drawFruit() {
  if (!fruit) return;
  const p   = 0.7 + 0.3 * Math.sin(Date.now() / 500);
  const rgb = hexRgb(fruitHex);
  ctx.shadowColor = `rgba(${rgb},${p})`;
  ctx.shadowBlur  = 20 * p;
  ctx.fillStyle   = `rgba(${rgb},${p})`;
  const px = fruit.x * CELL, py = fruit.y * CELL;
  ctx.fillRect(px + CELL/2-2, py+2,         4, 4);
  ctx.fillRect(px+2,          py+CELL/2-2,  4, 4);
  ctx.fillRect(px + CELL/2-2, py+CELL-6,    4, 4);
  ctx.fillRect(px + CELL-6,   py+CELL/2-2,  4, 4);
  ctx.fillRect(px + CELL/2-2, py+CELL/2-2,  4, 4);
  ctx.shadowBlur = 0;
}

function drawLevelFlash() {
  const elapsed = Date.now() - levelFlashTime;
  if (elapsed > 1800) return;
  const a = Math.pow(1 - elapsed / 1800, 1.5);
  ctx.save();
  ctx.globalAlpha = a;
  ctx.font        = `bold ${Math.floor(CELL * 2.4)}px Courier New`;
  ctx.textAlign   = 'center';
  ctx.shadowColor = accentHex;
  ctx.shadowBlur  = 30;
  ctx.fillStyle   = accentHex;
  ctx.fillText(`LEVEL ${level}`, canvas.width / 2, canvas.height / 2);
  ctx.restore();
}

// ── input ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { if (!running) start(); return; }
  if (e.code === 'KeyM')  { toggleMute(); return; }
  const map = {
    ArrowUp:{x:0,y:-1}, KeyW:{x:0,y:-1},
    ArrowDown:{x:0,y:1}, KeyS:{x:0,y:1},
    ArrowLeft:{x:-1,y:0}, KeyA:{x:-1,y:0},
    ArrowRight:{x:1,y:0}, KeyD:{x:1,y:0},
  };
  const d = map[e.code];
  if (!d) return;
  if (d.x === -dir.x && d.y === -dir.y) return;
  nextDir = d;
  e.preventDefault();
});

// ── boot ──────────────────────────────────────────────────────────────────
init();
draw();
(function idleLoop() {
  if (!running) draw();
  updateBoostBar();
  requestAnimationFrame(idleLoop);
})();
</script>
</body>
